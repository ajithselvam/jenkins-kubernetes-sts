apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jenk
  namespace: default
spec:
  serviceName: "jenk"
  replicas: 1
  selector:
    matchLabels:
      app: jenk
  template:
    metadata:
      labels:
        app: jenk
    spec:
      containers:
        - name: jenk
          image: jenkins/jenkins:lts
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          ports:
            - containerPort: 8080
            - containerPort: 50000
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            # --- MOUNT THE SOCKET ---
            - name: docker-sock
              mountPath: /var/run/docker.sock
            # ------------------------

      initContainers:
      - name: chmod
        image: busybox
        command: ['sh', '-c', 'chmod 777 /var/jenkins_home']
        volumeMounts:
          - name: jenkins-home
            mountPath: /var/jenkins_home        

      volumes:
        # --- DEFINE THE HOSTPATH VOLUME ---
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        # ----------------------------------

  volumeClaimTemplates:
  - metadata:
      name: jenkins-home
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 900Mi




--- # SERVICE
apiVersion: v1
kind: Service
metadata:
  name: jenk
  namespace: default

spec:
  type: LoadBalancer
  selector:
    app: jenk

  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: agent
      port: 50000
      targetPort: 50000
