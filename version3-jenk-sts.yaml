apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jenk
  namespace: default
  labels:
    app.kubernetes.io/name: jenk
spec:
  serviceName: "jenk"
  replicas: 1
  selector:
    matchLabels:
      app: jenk
  template:
    metadata:
      labels:
        app: jenk
    spec:
      containers:
        - name: jenk
          image: jenkins/jenkins:lts
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: agent
              containerPort: 50000
          resources:
            requests:
              cpu: 10m
              memory: 200Mi
            limits:
              cpu: 20m
              memory: 250Mi
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: jenkins-socket
              mountPath: /var/run/docker.sock
          
      initContainers:
        - name: jenkins-fix
          image: busybox
          command: ['sh', '-c', 'chmod 777 /var/jenkins_home']
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
      volumes:
        - name: jenkins-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket

  volumeClaimTemplates:
  - metadata:
      name: jenkins-home
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 100Mi


--- # service
apiVersion: v1
kind: Service
metadata:
  name: jenk
  namespace: default
  labels:
    app.kubernetes.io/name: jenk

spec:
  type: NodePort
  selector:
    app: jenk

  ports:  
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: agent
      port: 50000
      targetPort: 50000
